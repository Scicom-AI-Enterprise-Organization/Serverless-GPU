{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "serverlessgpu.fullname" . }}-postgres
  labels:
    {{- include "serverlessgpu.labels" . | nindent 4 }}
    {{- include "serverlessgpu.postgres.selectorLabels" . | nindent 4 }}
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    {{- include "serverlessgpu.postgres.selectorLabels" . | nindent 4 }}
  clusterIP: None
{{- if not .Values.externalSecrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "serverlessgpu.fullname" . }}-postgres-auth
  labels:
    {{- include "serverlessgpu.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ required "postgres.password is required when postgres.enabled and externalSecrets=false" .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
{{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "serverlessgpu.fullname" . }}-postgres
  labels:
    {{- include "serverlessgpu.labels" . | nindent 4 }}
    {{- include "serverlessgpu.postgres.selectorLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "serverlessgpu.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "serverlessgpu.postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "serverlessgpu.postgres.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: {{ include "serverlessgpu.fullname" . }}-postgres-auth, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "serverlessgpu.fullname" . }}-postgres-auth, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: {{ include "serverlessgpu.fullname" . }}-postgres-auth, key: POSTGRES_DB } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
        {{- with .Values.postgres.storage.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
{{- end }}
