{{- if and .Values.gateway.autoscaler (eq .Values.gateway.provider "primeintellect") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "serverlessgpu.fullname" . }}-pi
  labels:
    {{- include "serverlessgpu.labels" . | nindent 4 }}
type: Opaque
stringData:
  PI_API_KEY: {{ required "primeintellect.apiKey is required when provider=primeintellect" .Values.primeintellect.apiKey | quote }}
{{- end }}
{{- if and .Values.gateway.autoscaler (eq .Values.gateway.provider "runpod") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "serverlessgpu.fullname" . }}-runpod
  labels:
    {{- include "serverlessgpu.labels" . | nindent 4 }}
type: Opaque
stringData:
  RUNPOD_API_KEY: {{ required "runpod.apiKey is required when provider=runpod" .Values.runpod.apiKey | quote }}
  {{- with .Values.runpod.tsAuthKey }}
  TS_AUTHKEY: {{ . | quote }}
  {{- end }}
{{- end }}
{{- if .Values.gateway.apiKeys }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "serverlessgpu.fullname" . }}-auth
  labels:
    {{- include "serverlessgpu.labels" . | nindent 4 }}
type: Opaque
stringData:
  GATEWAY_API_KEYS: {{ .Values.gateway.apiKeys | quote }}
{{- end }}
