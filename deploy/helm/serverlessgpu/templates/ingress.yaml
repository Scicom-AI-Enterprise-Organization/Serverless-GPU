{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "serverlessgpu.fullname" . }}
  labels:
    {{- include "serverlessgpu.labels" . | nindent 4 }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.issuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuer | quote }}
    {{- end }}
    # Streaming routes use Server-Sent Events. Disable proxy buffering so
    # tokens reach the client immediately.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    {{- if .Values.ingress.cors }}
    nginx.ingress.kubernetes.io/enable-cors: "true"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
        {{- if and .Values.web.enabled .Values.ingress.webHost }}
        - {{ .Values.ingress.webHost | quote }}
        {{- end }}
      secretName: {{ include "serverlessgpu.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "serverlessgpu.fullname" . }}-gateway
                port:
                  number: 80
    {{- if and .Values.web.enabled .Values.ingress.webHost }}
    - host: {{ .Values.ingress.webHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "serverlessgpu.fullname" . }}-web
                port:
                  number: 80
    {{- end }}
{{- end }}
